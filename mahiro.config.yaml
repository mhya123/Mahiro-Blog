# ─── 音乐服务配置 ───────────────────────────────────
music:
  api: https://api.qijieya.cn/meting # Meting API 地址
  autoplay: false                    # 进入音乐页是否自动播放
  playlist:                          # 默认显示的播放单 (网易云音乐 ID)
    - 1377164042

# ─── 评论系统配置 ───────────────────────────────────
comments:
  enable: true          # 是否启用评论功能
  type: twikoo          # 评论系统类型：giscus | waline | twikoo | none

  # Twikoo 配置 (腾讯云开发/Vercel等部署的评论系统)
  twikoo:
    envId: "https://tk.mahiro.work" # 环境 ID / 服务器地址
    region: ""            # 环境地域（可选，腾讯云需要）
    lang: "zh-CN"         # 界面语言

  # Giscus 配置（基于 GitHub Discussions 的评论系统）
  giscus:
    repo: mhya123/giscus           # GitHub 仓库（用于存储评论）
    repoId: R_kgDORMm8IQ           # 仓库 ID（通过 giscus.app 获取）
    category: General              # Discussion 分类
    categoryId: DIC_kwDORMm8Ic4C2HoO  # 分类 ID
    mapping: pathname              # 评论映射方式: pathname | url | title | og:title
    lang: zh-CN                    # 界面语言
    inputPosition: top             # 评论框位置: top | bottom
    reactionsEnabled: '1'          # 是否启用表情回应，'1' 开启 / '0' 禁用
    emitMetadata: '0'              # 是否发送 Discussion 元数据，建议 '0'
    loading: lazy                  # 加载方式: lazy (按需加载) | eager (立即加载)

  # Waline 配置（自部署的评论系统）
  waline:
    serverURL: https://your-waline-server  # Waline 地址
    lang: zh-CN                            # 界面语言
    emoji:                                 # 表情包列表
      - https://unpkg.com/@waline/emojis@1.1.0/weibo
      - https://unpkg.com/@waline/emojis@1.1.0/bilibili
    meta:                                  # 访客信息字段
      - nick
      - mail
      - link
    requiredMeta: []                       # 必选字段
    reaction: false                        # 开启文章表情互动投票
    pageview: false                        # 开启阅读统计 (已用 Umami 的话建议关闭)
