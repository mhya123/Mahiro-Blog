# ==========================================================
# Mahiro Blog 全局配置文件
# ──────────────────────────────────────────────────────────
# 此文件用于管理博客的核心信息、界面展示、组件开关及第三方服务集成。
# 修改后通常需要重启开发服务器以生效。
# ==========================================================

site:
  # ─── 核心视觉交互 ───
  glassmorphism:
    enable: true          # 全局开启/关闭毛玻璃（Glassmorphism）特效
    intensity: 16         # 毛玻璃模糊程度（单位 px），推荐值 16-32

  url: https://www.mahiro.work  # 站点部署的正式根路径
  tab: Mahiro's Blog            # 浏览器标签栏后缀
  title: Mahiro                 # 网站主标题
  description: MhYa123 的个人博客，这里记录着对技术的探索、生活中的随想与各类有趣的杂谈。
  language: zh                  # 站点主语言 (zh/en)
  favicon: https://headimg.mahiro.work/ # 网站图标 URL
  
  # ─── 主题与外观 ───
  theme:
    light: garden               # 浅色模式主题 (基于 DaisyUI)
    dark: dracula               # 深色模式主题 (基于 DaisyUI)
    code: github-dark           # 代码块高亮主题 (Shiki)
  
  date_format: ddd MMM DD YYYY  # 全站日期展示格式 (Day.js 格式)

  # ─── 内容 AI 翻译服务 ───
  translation:
    enable: true                # 是否启用文章 AI 翻译功能
    defaultProvider: google     # 翻译服务商可选: google, openai
    defaultTargetLanguage: en   # 默认目标语言
    defaultModel: gpt-5.4-mini  # 翻译所使用的 AI 模型 (仅 OpenAI 生效)

  # ─── 博客功能设置 ───
  blog:
    pageSize: 7                 # 首页或文章列表每页显示的数量
    ellipsisThreshold: 7        # 页码导航触发省略模式的临界页数
    commitHistorySize: 6        # 文章修订历史最大可见条数 (超出后自动滚动)
    randomCoverSources:         # 随机封面图床，当前一张失效时会自动尝试下一张
      - https://t.alcy.cc/ycy
      - https://moe.jitsu.top/img/?sort=pc&size=mw2048

  # ─── 顶部 Banner 设置 ───
  banner:
    defaultMode: background     # 默认 Banner 模式: normal (带文字) | background (沉浸式背景)
    enableRandom: false         # 开启即每次刷新随机切换 Banner
    randomUrl: https://sta.mahiro.work/i/2026/04/09/69d7596fcf8df.png # 随机 Banner 的基础源
    randomCount: 5              # 随机池数量
    height: 60vh                # Banner 视觉高度
    images:                     # Banner 轮播/展示图片列表
      - https://sta.mahiro.work/i/2026/04/09/69d7596fcf8df.png

  # ─── 页脚 Footer 配置 ───
  footer:
    # 模块显示控制 (true 为开启)
    showBrand: true             # 显示品牌标识
    showQuickLinks: true        # 显示快速导航入口
    showSocial: true            # 显示社交媒体图标
    showTechStack: true         # 显示项目依赖技术栈
    showStats: true             # 显示访问量统计
    showRecordInfo: true        # 显示备案信息
    showRssIcon: true           # 显示 RSS 订阅图标
    showLicense: true           # 显示版权协议
    showCraftedBy: true         # 显示制作人致谢
    enableBuildInfoCard: true   # 显示构建环境信息卡片

    startYear: 2025             # 博客运行的起始年份
    poweredByText: Powered by   # 驱动文案
    poweredByName: Mahiro-Blog  # 驱动项目名
    poweredByUrl: https://github.com/mhya123/Mahiro-Blog
    builtWithText: Built with   # 构建工具文案
    quickLinksTitle: 导航        # 导航板块标题
    socialTitle: 社交            # 社交板块标题
    craftedByText: Crafted with # 致谢文案

    # 快捷链接项定义
    quickLinks:
      - href: /
        icon: lucide:home
        label: 首页
      - href: /about
        icon: lucide:user
        label: 关于
      - href: /friend
        icon: lucide:users
        label: 友链
      - href: /project
        icon: lucide:folder-kanban
        label: 项目
      - href: /navigation
        icon: lucide:compass
        label: 导航
      - href: /drive
        icon: lucide:hard-drive
        label: 网盘
      - href: /rss.xml
        icon: ri:rss-line
        label: RSS

    # 技术栈展示项定义
    techStack:
      - name: Astro
        href: https://astro.build
      - name: Tailwind CSS
        href: https://tailwindcss.com
      - name: anime.js
        href: https://animejs.com
      - name: daisyUI
        href: https://daisyui.com
      - name: GSAP
        href: https://gsap.com

  # ─── 备案与合规 ───
  icp: 蜀ICP备2025178844号-2
  icp_link: https://beian.miit.gov.cn/
  police_beian: null
  police_beian_code: 11010801232033243
  police_beian_link: https://beian.mps.gov.cn/#/query/webSearch?code=11010801232033243

  # ─── 站点组件配置 ───
  announcement:
    enable: true                # 是否启用全局公告条
    content: 🎉 欢迎来到 Mahiro's Blog！网站持续建设中~
    type: info                  # 公告类型: info, success, warning, error
    size: lg                    # 尺寸: sm, md, lg
    closable: false             # 用户是否可以手动关闭

  reward:
    enable: false               # 是否启用打赏功能
    wechat: /weixin.jpg         # 微信支付二维码 URL
    alipay: /zhifubao.jpg       # 支付宝支付二维码 URL

  # ─── 独立页面 Meta 配置 ───
  pages:
    home:
      title: Mahiro's Blog
      subtitle: 欲买桂花同载酒，终不似，少年游！
      typewriterTexts:          # 首页打字机效果显示的文本段
        - 💻 Hello World, Hello Future. | 你好世界，你好未来。
        - 🌸 欲买桂花同载酒，终不似，少年游。
        - 🌟 保持热爱，奔赴山海。| Stay passionate, head for the mountains and seas.
        - ☕ 代码如诗，生活如歌。| Code is poetry, life is a song.
        - 🌊 长风破浪会有时，直挂云帆济沧海。
        - 🎯 日拱一卒，功不唐捐。| Small steps every day lead to great journeys.
        - 🔭 仰望星空，脚踏实地。| Dream big, stay grounded.
        - 🍃 岁月不居，时节如流。| Time waits for no one.
    friend:
      title: 友链
      subtitle: 记录那些珍贵的友谊，分享彼此的故事
    about:
      title: About Me
      subtitle: 一个热爱生活与技术的普通人！
    navigation:
      title: 网站导航
      subtitle: 收藏的常用网站和工具链接
    project:
      title: Projects
      subtitle: 收录优质开源项目，欢迎提交你的作品！
    drive:
      title: 网盘
      subtitle: 站内直接管理 AList 文件，支持查看、搜索、上传与文件操作
      permissions:
        upload: false          # 是否允许访客上传 (危险)
        mkdir: false           # 是否允许访客创建文件夹
        view: true             # 是否允许查看
        download: true         # 是否允许下载
        rename: false          # 是否允许重命名
        copy: false            # 是否允许复制
        move: false            # 是否允许移动
        remove: false          # 是否允许删除
    music:
      title: Cloud Music
      subtitle: 沉浸式享受音乐时光

  # ─── 导航菜单项 ───
  menu:
    - id: home
      text: 首页
      href: /
      svg: material-symbols:home-outline-rounded
      target: _self
    - id: write
      text: 随笔
      href: /write
      svg: material-symbols:edit-square-outline-rounded
      target: _self
    - id: navigation
      text: 导航
      href: /navigation
      svg: material-symbols:explore-outline
      target: _self
    - id: music
      text: 音乐
      href: /music
      svg: material-symbols:music-note-rounded
      target: _self
    - id: drive
      text: 网盘
      href: /drive
      svg: lucide:hard-drive
      target: _self
    - id: project
      text: 实验室
      href: /project
      svg: material-symbols:code-blocks-outline
      target: _self
    - id: friend
      text: 友链
      href: /friend
      svg: material-symbols:supervisor-account-outline-rounded
      target: _self

