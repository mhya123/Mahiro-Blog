name: Deploy to GitHub Pages - Astro

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Admin Friend Link Audit"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Git Metadata
        run: pnpm run git

      - name: Generate AI summaries
        if: env.OPENAI_API_KEY != ''
        run: pnpm run ai:summary -- --all --dir src/content/blog --skip-same-model

      - name: Build site
        run: pnpm run build
        env:
          PUBLIC_GITHUB_OWNER: ${{ secrets.PUBLIC_GITHUB_OWNER }}
          PUBLIC_GITHUB_REPO: ${{ secrets.PUBLIC_GITHUB_REPO }}
          PUBLIC_GITHUB_BRANCH: ${{ secrets.PUBLIC_GITHUB_BRANCH }}
          PUBLIC_GITHUB_APP_ID: ${{ secrets.PUBLIC_GITHUB_APP_ID }}
          PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.PUBLIC_UMAMI_WEBSITE_ID }}
          PUBLIC_UMAMI_SHARE_ID: ${{ secrets.PUBLIC_UMAMI_SHARE_ID }}
          POST_PASSWORD: ${{ secrets.POST_PASSWORD }}

      - name: Sync updated JSON to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/json/build-info.json src/json/git-history.json src/content/blog
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(ci): update generated content [skip ci]" && git pull --rebase --autostash -X theirs origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
